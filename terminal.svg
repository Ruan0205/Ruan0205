<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560">
  <style>
    .mono { font-family: "Courier New", Courier, monospace; font-size: 15px; font-weight: 600; }
    .fg { fill: #c9d1d9; }
    .muted { fill: #8b949e; }
    .key { fill: #79c0ff; }
    .value { fill: #a5d6ff; }
    .prompt { fill: #3fb950; }
    .cmd { fill: #58a6ff; }
    .cover { fill: #0d1117; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>

  <rect width="900" height="560" rx="10" fill="#0d1117" />
  <rect width="900" height="40" rx="10" fill="#161b22" />
  <rect y="30" width="900" height="10" fill="#161b22" />

  <circle cx="24" cy="20" r="6" fill="#ff5f57" />
  <circle cx="47" cy="20" r="6" fill="#febc2e" />
  <circle cx="70" cy="20" r="6" fill="#28c840" />

  <text x="450" y="25" text-anchor="middle" font-family="Courier New, Courier, monospace" font-size="13" fill="#8b949e">
    sre-profile.json - bash
  </text>

  <text class="mono" x="28" y="70"><tspan class="prompt">/ruan</tspan><tspan class="fg"> $ </tspan><tspan class="cmd">cat</tspan><tspan class="fg"> sre-profile.json</tspan></text>
  <text class="mono fg" x="28" y="95">{</text>
  <text class="mono" x="28" y="120"><tspan class="fg">  </tspan><tspan class="key">"name"</tspan><tspan class="fg">: </tspan><tspan class="value">"Ruan Oliveira Moraes"</tspan><tspan class="fg">,</tspan></text>
  <text class="mono" x="28" y="145"><tspan class="fg">  </tspan><tspan class="key">"role"</tspan><tspan class="fg">: </tspan><tspan class="value">"SRE / DevOps Engineer"</tspan><tspan class="fg">,</tspan></text>
  <text class="mono" x="28" y="170"><tspan class="fg">  </tspan><tspan class="key">"focus"</tspan><tspan class="fg">: </tspan><tspan class="value">"confiabilidade, automacao e operacao de servicos criticos"</tspan><tspan class="fg">,</tspan></text>
  <text class="mono" x="28" y="195"><tspan class="fg">  </tspan><tspan class="key">"toolbox"</tspan><tspan class="fg">: [</tspan></text>
  <text class="mono" x="28" y="220"><tspan class="fg">    </tspan><tspan class="value">"Python"</tspan><tspan class="fg">, </tspan><tspan class="value">"Shell"</tspan><tspan class="fg">, </tspan><tspan class="value">"PowerShell"</tspan><tspan class="fg">, </tspan><tspan class="value">"Docker"</tspan><tspan class="fg">, </tspan><tspan class="value">"Kubernetes"</tspan><tspan class="fg">,</tspan></text>
  <text class="mono" x="28" y="245"><tspan class="fg">    </tspan><tspan class="value">"GitLab"</tspan><tspan class="fg">, </tspan><tspan class="value">"GitHub Actions"</tspan><tspan class="fg">, </tspan><tspan class="value">"ArgoCD"</tspan><tspan class="fg">, </tspan><tspan class="value">"Proxmox"</tspan><tspan class="fg">, </tspan><tspan class="value">"Grafana"</tspan></text>
  <text class="mono" x="28" y="270"><tspan class="fg">  ],</tspan></text>
  <text class="mono" x="28" y="295"><tspan class="fg">  </tspan><tspan class="key">"public_projects"</tspan><tspan class="fg">: [</tspan></text>
  <text class="mono" x="28" y="320"><tspan class="fg">    </tspan><tspan class="value">"tradutor-universal-de-pdf"</tspan><tspan class="fg">,</tspan></text>
  <text class="mono" x="28" y="345"><tspan class="fg">    </tspan><tspan class="value">"distributed-proxy-manager"</tspan><tspan class="fg">,</tspan></text>
  <text class="mono" x="28" y="370"><tspan class="fg">    </tspan><tspan class="value">"editor-automatico-videos"</tspan></text>
  <text class="mono" x="28" y="395"><tspan class="fg">  ],</tspan></text>
  <text class="mono" x="28" y="420"><tspan class="fg">  </tspan><tspan class="key">"currently_building"</tspan><tspan class="fg">: </tspan><tspan class="value">"ferramentas que tornam infra mais clara e repetivel"</tspan></text>
  <text class="mono fg" x="28" y="445">}</text>
  <text class="mono" x="28" y="480"><tspan class="prompt">/ruan</tspan><tspan class="fg"> $ </tspan><tspan class="cmd">echo</tspan><tspan class="fg"> "automate, observe, improve"</tspan></text>
  <text class="mono value" x="28" y="505">automate, observe, improve</text>
  <text class="mono" x="28" y="530"><tspan class="prompt">/ruan</tspan><tspan class="fg"> $ </tspan></text>

